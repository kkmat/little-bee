<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <g transform="translate(40 40)">
    <!-- 8 watercolor petals -->
    <g stroke="#5C3D1F" stroke-width="0.8">
      <ellipse cx="0" cy="-22" rx="7" ry="14" fill="#FFFBEC"/>
      <ellipse cx="16" cy="-16" rx="7" ry="14" fill="#FFFBEC" transform="rotate(45 16 -16)"/>
      <ellipse cx="22" cy="0"  rx="7" ry="14" fill="#FFFBEC" transform="rotate(90 22 0)"/>
      <ellipse cx="16" cy="16" rx="7" ry="14" fill="#FFFBEC" transform="rotate(135 16 16)"/>
      <ellipse cx="0" cy="22"  rx="7" ry="14" fill="#FFFBEC"/>
      <ellipse cx="-16" cy="16" rx="7" ry="14" fill="#FFFBEC" transform="rotate(45 -16 16)"/>
      <ellipse cx="-22" cy="0"  rx="7" ry="14" fill="#FFFBEC" transform="rotate(90 -22 0)"/>
      <ellipse cx="-16" cy="-16" rx="7" ry="14" fill="#FFFBEC" transform="rotate(135 -16 -16)"/>
    </g>
    <circle r="9" fill="#E8B547" stroke="#5C3D1F" stroke-width="1"/>
    <!-- pollen dots -->
    <g fill="#5C3D1F" opacity="0.8">
      <circle cx="0" cy="-3" r="0.9"/><circle cx="3" cy="2" r="0.9"/><circle cx="-3" cy="2" r="0.9"/>
      <circle cx="-4" cy="-2" r="0.7"/><circle cx="4" cy="-3" r="0.7"/>
    </g>
  </g>
</svg>
