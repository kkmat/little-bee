<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 80" fill="none">
  <!-- ornamental rule with sun in middle -->
  <g stroke="#A88030" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <path d="M40 40 L240 40"/>
    <path d="M70 36 L230 36" stroke-dasharray="1 5" opacity="0.55"/>
    <path d="M360 40 L560 40"/>
    <path d="M370 44 L530 44" stroke-dasharray="1 5" opacity="0.55"/>
    <!-- end flourishes -->
    <path d="M40 40 q -10 -8 -16 0 q 16 4 16 0 z"/>
    <path d="M560 40 q 10 -8 16 0 q -16 4 -16 0 z"/>
  </g>
  <!-- sun motif -->
  <g transform="translate(300 40)">
    <g stroke="#A88030" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
      <path d="M0 -32 L0 -22"/>
      <path d="M22 -22 L16 -16"/>
      <path d="M32 0 L22 0"/>
      <path d="M22 22 L16 16"/>
      <path d="M0 32 L0 22"/>
      <path d="M-22 22 L-16 16"/>
      <path d="M-32 0 L-22 0"/>
      <path d="M-22 -22 L-16 -16"/>
    </g>
    <circle r="14" fill="#F5C84B" stroke="#A88030" stroke-width="1.2"/>
    <circle r="14" fill="#F5C84B" opacity="0.6"/>
  </g>
  <!-- tiny leaves -->
  <g fill="#98A77C" stroke="#5C3D1F" stroke-width="0.4">
    <ellipse cx="250" cy="40" rx="6" ry="2.5" transform="rotate(-20 250 40)"/>
    <ellipse cx="350" cy="40" rx="6" ry="2.5" transform="rotate(20 350 40)"/>
  </g>
</svg>
