<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>🔮 Predictions — Little Bee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&family=Amiri&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
</head>
<body class="botanical">
  <a href="./index.html" class="back-link">← Back</a>
  <div class="lang-toggle" role="group"><button data-lang="en" class="active">EN</button><button data-lang="ar">ع</button></div>

  <main class="game-shell">
    <header class="text-center mb-4">
      <p class="font-script text-3xl text-[color:var(--rust-deep)]">🔮</p>
      <h1 class="font-display text-2xl uppercase tracking-[0.18em]">Predictions</h1>
      <p class="muted mt-1">Peek into baby's future. We'll save your prophecies for posterity.</p>
    </header>

    <div id="form-card" class="game-card">
      <p class="muted">Pick a question, then drop your prediction:</p>
      <select id="prompt" class="lb-text mt-3"></select>
      <input id="value" class="lb-text mt-3" maxlength="200" placeholder="your prediction..." />
      <button id="send" class="btn w-full mt-3">Save Prediction 🔮</button>
      <p id="status" class="muted text-sm mt-2 text-center">&nbsp;</p>
    </div>

    <h2 class="section-title mt-8">Predictions wall</h2>
    <div id="filter" class="flex flex-wrap gap-2 justify-center mb-3"></div>
    <div id="wall" class="wall"><p class="muted text-center">Loading...</p></div>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/join.js"></script>
  <script>
  const PROMPTS = [
    { key: 'eye_color',   label: "Baby's eye color" },
    { key: 'first_word',  label: "Baby's first word" },
    { key: 'looks_like',  label: "Baby will look more like..." },
    { key: 'birth_weight',label: "Birth weight (kg)" },
    { key: 'first_food',  label: "First favourite food" },
    { key: 'profession',  label: "Future profession" },
    { key: 'personality', label: "One word for baby's personality" },
    { key: 'hidden_talent',label:"Surprise hidden talent" },
  ];

  const $prompt = document.getElementById('prompt');
  const $value  = document.getElementById('value');
  const $send   = document.getElementById('send');
  const $status = document.getElementById('status');
  const $wall   = document.getElementById('wall');
  const $filter = document.getElementById('filter');

  PROMPTS.forEach(p => {
    const o = document.createElement('option');
    o.value = p.key;
    o.textContent = p.label;
    $prompt.appendChild(o);
  });

  let activeFilter = '';
  function buildFilter() {
    $filter.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'badge-pill';
    all.textContent = 'All';
    all.addEventListener('click', () => { activeFilter = ''; load(); });
    $filter.appendChild(all);
    PROMPTS.forEach(p => {
      const b = document.createElement('button');
      b.className = 'badge-pill';
      b.style.cursor = 'pointer';
      b.textContent = p.label;
      b.addEventListener('click', () => { activeFilter = p.key; load(); });
      $filter.appendChild(b);
    });
  }

  async function load() {
    try {
      const data = await window.LittleBeeAPI.listPredictions(activeFilter || undefined);
      $wall.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        $wall.innerHTML = '<p class="muted text-center">No predictions yet — be the first prophet 🔮</p>';
        return;
      }
      data.items.forEach(it => {
        const c = document.createElement('div');
        c.className = 'wall-card';
        const promptLabel = (PROMPTS.find(p => p.key === (it.prompt_key || activeFilter)) || {}).label || (it.prompt_key || '');
        c.innerHTML = `<span class="wall-card__nick"></span><p class="wall-card__msg"></p><span class="wall-card__meta"></span>`;
        c.querySelector('.wall-card__nick').textContent = it.nickname;
        c.querySelector('.wall-card__msg').textContent  = `${promptLabel}: ${it.value}`;
        c.querySelector('.wall-card__meta').textContent = new Date(it.created_at).toLocaleString();
        $wall.appendChild(c);
      });
    } catch (err) {
      $wall.innerHTML = '<p class="muted text-center">Could not load yet.</p>';
    }
  }

  async function send() {
    const v = $value.value.trim();
    if (!v) return;
    $send.disabled = true;
    try {
      await window.LittleBeeAPI.postPrediction($prompt.value, v);
      $value.value = '';
      $status.textContent = 'Saved 💛';
      setTimeout(() => { $status.textContent = ' '; }, 1500);
      load();
    } catch (err) {
      $status.textContent = 'Could not save — try again?';
    } finally {
      $send.disabled = false;
    }
  }

  $send.addEventListener('click', send);
  buildFilter();
  if (window.LittleBeeAPI.isJoined()) load();
  else window.addEventListener('lb-joined', load);
  </script>
</body>
</html>
