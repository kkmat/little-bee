<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>🎵 Music Requests — Little Bee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&family=Amiri&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
  <style>
    .search-shell { position: relative; }
    .suggest {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      z-index: 30;
      background: linear-gradient(180deg, rgba(255,253,247,0.98), rgba(248,238,220,0.95));
      border: 1px solid rgba(184, 134, 42, 0.32);
      border-radius: 6px;
      max-height: 360px; overflow-y: auto;
      box-shadow: 0 18px 36px -16px rgba(60, 32, 12, 0.45);
    }
    .suggest button {
      width: 100%; display: flex; gap: 12px; align-items: center;
      padding: 10px 12px;
      background: transparent; border: 0;
      border-bottom: 1px dotted rgba(165, 95, 56, 0.2);
      cursor: pointer; text-align: left;
      font-family: inherit; color: var(--ink);
      font-size: 15px;
    }
    .suggest button:last-child { border-bottom: 0; }
    .suggest button:hover { background: rgba(232, 181, 71, 0.10); }
    .suggest img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; flex: none; box-shadow: 0 2px 6px rgba(60,32,12,0.25); }
    .suggest .meta { flex: 1; min-width: 0; }
    .suggest .meta .t { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--ink); display: block; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suggest .meta .a { font-style: italic; font-size: 13px; color: var(--ink-faded); display: block; line-height: 1.15; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick-card {
      display: flex; gap: 14px; align-items: center;
      padding: 12px 14px;
      border: 1px solid rgba(184, 134, 42, 0.28);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(255,253,247,0.95), rgba(248,238,220,0.85));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 8px 18px -8px rgba(60, 32, 12, 0.3);
      margin-top: 12px;
    }
    .pick-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; flex: none; box-shadow: 0 4px 10px rgba(60,32,12,0.3); }
    .pick-card__t { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600; line-height: 1.1; }
    .pick-card__a { font-style: italic; color: var(--ink-faded); font-size: 14px; }
    .wall-card.queue { display: flex; gap: 12px; align-items: center; }
    .wall-card.queue img { width: 56px; height: 56px; border-radius: 4px; object-fit: cover; flex: none; box-shadow: 0 3px 8px rgba(60,32,12,0.25); }
    .wall-card.queue .body { flex: 1; min-width: 0; }
    .wall-card.queue .body .title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; line-height: 1.15; }
    .wall-card.queue .body .a { font-style: italic; font-size: 13px; color: var(--ink-faded); }
    .wall-card.queue .body .who { font-family: 'Dancing Script', cursive; color: var(--rust-deep); font-size: 18px; line-height: 1; margin-top: 2px; }
    .preview-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid rgba(184, 134, 42, 0.4);
      background: linear-gradient(135deg, var(--gold-light), var(--gold-deep));
      color: var(--ink);
      cursor: pointer;
      display: grid; place-items: center;
      flex: none;
    }
    .preview-btn[disabled] { opacity: 0.45; cursor: not-allowed; }
  </style>
</head>
<body class="botanical">
  <a href="./index.html" class="back-link">← Back</a>
  <div class="lang-toggle" role="group"><button data-lang="en" class="active">EN</button><button data-lang="ar">ع</button></div>

  <main class="game-shell">
    <header class="text-center mb-4">
      <p class="font-script text-3xl text-[color:var(--rust-deep)]">🎵</p>
      <h1 class="font-display text-2xl uppercase tracking-[0.18em]">Music Requests</h1>
      <p class="muted mt-1">Search Spotify and pick a song you'd love to hear tonight</p>
    </header>

    <div class="game-card">
      <div class="search-shell">
        <input id="q" class="lb-text" placeholder="Search a song or artist..." autocomplete="off" />
        <div id="suggest" class="suggest" hidden></div>
      </div>

      <div id="picked" hidden></div>

      <button id="send" class="btn w-full mt-3" disabled>🎶 Add to the playlist</button>
      <p id="status" class="muted text-sm mt-2 text-center">&nbsp;</p>
      <p class="muted text-xs text-center mt-2 italic" id="manual-link">
        Can't find it? <a href="#" id="manual-toggle" style="text-decoration: underline; color: var(--ink-soft)">Type it manually</a>.
      </p>
      <div id="manual-form" hidden class="mt-3">
        <input id="m-song"   class="lb-text"      maxlength="120" placeholder="Song name..." />
        <input id="m-artist" class="lb-text mt-2" maxlength="120" placeholder="Artist (optional)" />
      </div>
    </div>

    <h2 class="section-title mt-8">Tonight's queue</h2>
    <div id="list" class="wall"><p class="muted text-center">Loading...</p></div>
  </main>

  <audio id="preview-audio"></audio>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/join.js"></script>
  <script>
  const API = window.LittleBeeAPI.apiBase;
  const $q       = document.getElementById('q');
  const $suggest = document.getElementById('suggest');
  const $picked  = document.getElementById('picked');
  const $send    = document.getElementById('send');
  const $status  = document.getElementById('status');
  const $list    = document.getElementById('list');
  const $manualToggle = document.getElementById('manual-toggle');
  const $manualForm   = document.getElementById('manual-form');
  const $mSong  = document.getElementById('m-song');
  const $mArtist= document.getElementById('m-artist');
  const $audio  = document.getElementById('preview-audio');

  let pick = null;     // chosen Spotify track
  let manual = false;
  let curPreview = null;

  function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

  async function search(q) {
    if (!q.trim()) { $suggest.hidden = true; return; }
    try {
      const res = await fetch(`${API}/api/spotify/search?q=${encodeURIComponent(q)}`);
      if (!res.ok) throw 0;
      const data = await res.json();
      renderSuggest(data.items || []);
    } catch { $suggest.hidden = true; }
  }
  const debouncedSearch = debounce(search, 220);

  function escape(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

  function renderSuggest(items) {
    if (items.length === 0) { $suggest.hidden = true; return; }
    $suggest.innerHTML = '';
    items.forEach(it => {
      const b = document.createElement('button');
      b.innerHTML = `
        ${it.cover_url ? `<img src="${it.cover_url}" alt="">` : '<div style="width:44px;height:44px;border-radius:4px;background:#EDE0C5;flex:none"></div>'}
        <div class="meta"><span class="t"></span><span class="a"></span></div>
      `;
      b.querySelector('.t').textContent = it.name;
      b.querySelector('.a').textContent = it.artist + (it.album ? ` · ${it.album}` : '');
      b.addEventListener('click', () => choose(it));
      $suggest.appendChild(b);
    });
    $suggest.hidden = false;
  }

  function choose(it) {
    pick = it;
    manual = false;
    $suggest.hidden = true;
    $q.value = `${it.name} — ${it.artist}`;
    $picked.hidden = false;
    $picked.innerHTML = `
      <div class="pick-card">
        ${it.cover_url ? `<img src="${it.cover_url}" alt="">` : ''}
        <div style="flex:1; min-width:0">
          <div class="pick-card__t"></div>
          <div class="pick-card__a"></div>
        </div>
        <button class="preview-btn" id="preview-btn" ${it.preview_url ? '' : 'disabled'} title="${it.preview_url ? 'Preview 30s' : 'No preview available'}">▶</button>
      </div>
    `;
    $picked.querySelector('.pick-card__t').textContent = it.name;
    $picked.querySelector('.pick-card__a').textContent = it.artist;
    const $pv = document.getElementById('preview-btn');
    if ($pv && it.preview_url) {
      $pv.addEventListener('click', () => {
        if (curPreview === it.preview_url && !$audio.paused) { $audio.pause(); $pv.textContent = '▶'; return; }
        $audio.src = it.preview_url;
        $audio.play();
        curPreview = it.preview_url;
        $pv.textContent = '⏸';
        $audio.onended = () => { $pv.textContent = '▶'; };
      });
    }
    $send.disabled = false;
  }

  $q.addEventListener('input', () => {
    pick = null;
    $picked.hidden = true;
    $send.disabled = !manual;
    debouncedSearch($q.value);
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-shell, .suggest')) $suggest.hidden = true;
  });

  $manualToggle.addEventListener('click', (e) => {
    e.preventDefault();
    manual = true;
    $manualForm.hidden = false;
    $picked.hidden = true;
    $suggest.hidden = true;
    pick = null;
    $send.disabled = false;
  });

  async function send() {
    let payload;
    if (manual) {
      const song = $mSong.value.trim() || $q.value.trim();
      if (!song) return;
      payload = { song, artist: $mArtist.value.trim() };
    } else {
      if (!pick) return;
      payload = {
        song: pick.name, artist: pick.artist,
        spotify_uri: pick.uri,
        spotify_track_id: pick.id,
        cover_url: pick.cover_url || '',
        preview_url: pick.preview_url || '',
      };
    }
    $send.disabled = true; $send.textContent = 'Adding...';
    try {
      const data = await fetch(`${API}/api/song`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Player-Id': window.LittleBeeAPI.playerId() },
        body: JSON.stringify(payload),
      }).then(r => r.json());
      if (data.error) throw new Error(data.error);
      $status.textContent = data.pushed ? 'Added 💛 (+ Spotify)' : 'Added 💛';
      $q.value = ''; $mSong.value=''; $mArtist.value='';
      $picked.hidden = true; $manualForm.hidden = true; manual = false; pick = null;
      setTimeout(() => $status.textContent = ' ', 1800);
      load();
    } catch (e) {
      $status.textContent = 'Could not save — try again?';
    } finally {
      $send.disabled = false; $send.textContent = '🎶 Add to the playlist';
    }
  }

  $send.addEventListener('click', send);

  function fmt(ts) { return new Date(ts).toLocaleString(undefined, { hour: 'numeric', minute: '2-digit' }); }

  async function load() {
    try {
      const data = await window.LittleBeeAPI.listSongs();
      $list.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        $list.innerHTML = '<p class="muted text-center">Be the first to add a song 🎶</p>';
        return;
      }
      data.items.forEach(it => {
        const c = document.createElement('div');
        c.className = 'wall-card queue';
        c.innerHTML = `
          ${it.cover_url ? `<img src="${it.cover_url}" alt="">` : '<div style="width:56px;height:56px;border-radius:4px;background:#EDE0C5;flex:none"></div>'}
          <div class="body">
            <div class="title"></div>
            <div class="a"></div>
            <div class="who"></div>
          </div>
          ${it.preview_url ? `<button class="preview-btn" data-pv="${escape(it.preview_url)}">▶</button>` : ''}
        `;
        c.querySelector('.title').textContent = it.song;
        c.querySelector('.a').textContent = it.artist || '';
        c.querySelector('.who').textContent = it.nickname;
        if (it.played) c.style.opacity = '0.55';
        $list.appendChild(c);
      });
      // Hook preview buttons
      $list.querySelectorAll('.preview-btn').forEach(btn => {
        const url = btn.getAttribute('data-pv');
        btn.addEventListener('click', () => {
          if (curPreview === url && !$audio.paused) { $audio.pause(); btn.textContent = '▶'; return; }
          $list.querySelectorAll('.preview-btn').forEach(b => b.textContent = '▶');
          $audio.src = url; $audio.play(); curPreview = url; btn.textContent = '⏸';
          $audio.onended = () => { btn.textContent = '▶'; };
        });
      });
    } catch (err) {
      $list.innerHTML = '<p class="muted text-center">Could not load yet.</p>';
    }
  }

  if (window.LittleBeeAPI.isJoined()) load();
  else window.addEventListener('lb-joined', load);
  </script>
</body>
</html>
