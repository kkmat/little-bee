<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>💌 Advice Wall — Little Bee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&family=Amiri&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
</head>
<body class="botanical">
  <a href="./index.html" class="back-link">← Back</a>
  <div class="lang-toggle" role="group"><button data-lang="en" class="active">EN</button><button data-lang="ar">ع</button></div>

  <main class="game-shell">
    <header class="text-center mb-4">
      <p class="font-script text-3xl text-[color:var(--rust-deep)]">💌</p>
      <h1 class="font-display text-2xl uppercase tracking-[0.18em]">Advice Wall</h1>
      <p class="muted mt-1">Leave Kevin & Neethu your best parenting wisdom</p>
    </header>

    <div class="game-card">
      <textarea id="msg" class="lb-text" rows="4" maxlength="500" placeholder="The one thing I wish someone had told me..."></textarea>
      <button id="send" class="btn w-full mt-3">Send your advice 💌</button>
      <p id="status" class="muted text-sm mt-2 text-center">&nbsp;</p>
    </div>

    <h2 class="section-title mt-8">From the wall</h2>
    <div id="wall" class="wall">
      <p class="muted text-center">Loading...</p>
    </div>
  </main>

  <script src="../js/i18n.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/join.js"></script>
  <script>
  const $msg = document.getElementById('msg');
  const $send= document.getElementById('send');
  const $status = document.getElementById('status');
  const $wall   = document.getElementById('wall');

  function fmt(ts) {
    const d = new Date(ts);
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  async function load() {
    try {
      const data = await window.LittleBeeAPI.listAdvice();
      $wall.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        $wall.innerHTML = '<p class="muted text-center">Be the first to leave advice!</p>';
        return;
      }
      data.items.forEach(it => {
        const c = document.createElement('div');
        c.className = 'wall-card';
        c.innerHTML = `
          <span class="wall-card__nick"></span>
          <p class="wall-card__msg"></p>
          <span class="wall-card__meta"></span>
        `;
        c.querySelector('.wall-card__nick').textContent = it.nickname;
        c.querySelector('.wall-card__msg').textContent  = it.message;
        c.querySelector('.wall-card__meta').textContent = fmt(it.created_at);
        $wall.appendChild(c);
      });
    } catch (err) {
      $wall.innerHTML = '<p class="muted text-center">Could not load advice yet.</p>';
    }
  }

  async function send() {
    const text = $msg.value.trim();
    if (text.length < 2) return;
    $send.disabled = true;
    try {
      await window.LittleBeeAPI.postAdvice(text);
      $msg.value = '';
      $status.textContent = 'Saved 💛';
      setTimeout(() => { $status.textContent = ' '; }, 1500);
      load();
    } catch (err) {
      $status.textContent = 'Could not save — try again?';
    } finally {
      $send.disabled = false;
    }
  }

  $send.addEventListener('click', send);
  if (window.LittleBeeAPI.isJoined()) load();
  else window.addEventListener('lb-joined', load);
  </script>
</body>
</html>
