<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>📖 Memory Wall — Neethu & Kevin's Baby Shower</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Dancing+Script:wght@500;600;700&family=Amiri&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/games.css" />
  <style>
    /* True masonry via CSS columns */
    .masonry { columns: 1; column-gap: 16px; }
    @media (min-width: 540px)  { .masonry { columns: 2; } }
    @media (min-width: 880px)  { .masonry { columns: 3; } }
    @media (min-width: 1200px) { .masonry { columns: 4; } }
    .mem {
      break-inside: avoid;
      margin: 0 0 16px;
      padding: 18px 20px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(255,253,247,0.96), rgba(248,238,220,0.85));
      border: 1px solid rgba(184, 134, 42, 0.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.6),
                  0 12px 24px -14px rgba(60, 32, 12, 0.35);
      position: relative;
    }
    .mem.tilt-l { transform: rotate(-0.6deg); }
    .mem.tilt-r { transform: rotate(0.5deg); }
    .mem__type {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 10px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--ink-faded);
      margin-bottom: 6px;
    }
    .mem__nick {
      display: block;
      font-family: 'Dancing Script', cursive;
      font-size: 22px;
      color: var(--rust-deep);
      line-height: 1;
      margin-bottom: 6px;
    }
    .mem__body { font-family: 'Cormorant Garamond', serif; font-size: 16px; line-height: 1.5; }
    .mem__big {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: var(--rust-deep);
      margin: 4px 0;
    }
    .mem img { width: 100%; border-radius: 4px; display: block; }
    .mem audio { width: 100%; margin-top: 8px; }
    .mem.theme-photos { background: linear-gradient(135deg, #FFE9C7, #F4C97D); text-align: center; padding: 28px 20px; }
    .mem.theme-photos a { display: inline-block; margin-top: 10px; }
    .mem.theme-empty { text-align: center; color: var(--ink-faded); font-style: italic; }
    @media print {
      body { background: white; }
      body::before, body::after { display: none; }
      .back-link, .lang-toggle, .flora, .divider { display: none !important; }
      .game-shell { padding-top: 20px; }
      .masonry { columns: 3; }
      .mem { box-shadow: none; border: 1px solid #ccc; }
    }
  </style>
</head>
<body class="botanical">
  <a href="./index.html" class="back-link">← Back</a>
  <div class="lang-toggle" role="group"><button data-lang="en" class="active">EN</button><button data-lang="ar">ع</button></div>

  <img src="./assets/corner-tl.svg" class="flora flora--corner" alt="" style="top: 30px; left: -36px; opacity: 0.4;">
  <img src="./assets/corner-tl.svg" class="flora flora--corner" alt="" style="bottom: 30px; right: -36px; transform: rotate(180deg); opacity: 0.4;">

  <main class="game-shell">
    <header class="text-center mb-6">
      <span class="font-display italic text-xs tracking-[0.4em] uppercase text-[color:var(--ink-faded)] block mb-2" data-i18n="memoryWall.eyebrow">a keepsake from the day</span>
      <h1 class="font-script text-5xl md:text-6xl text-[color:var(--rust-deep)] leading-none" data-i18n="memoryWall.title">Memory Wall</h1>
      <span class="block mx-auto mt-3" style="width:90px;height:14px;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 90 14%22 fill=%22none%22&gt;&lt;path d=%22M2 7 Q 22 0, 45 7 T 88 7%22 stroke=%22%23A55F38%22 stroke-width=%221.4%22 fill=%22none%22 stroke-linecap=%22round%22/&gt;&lt;circle cx=%2245%22 cy=%227%22 r=%222.4%22 fill=%22%23A55F38%22/&gt;&lt;/svg&gt;');background-repeat:no-repeat;background-position:center;"></span>
      <p class="muted mt-3 max-w-md mx-auto" data-i18n="memoryWall.sub">Everything you've left for our little one — voices, advice, predictions, names, drawings 🐝</p>
      <button id="print-btn" class="btn btn--ghost mt-4" data-i18n="memoryWall.print">🖨️ Print as a memento</button>
    </header>

    <div class="divider divider--garland mb-6"></div>

    <div id="wall" class="masonry">
      <p class="muted text-center" style="column-span: all;" data-i18n="memoryWall.loading">Gathering memories...</p>
    </div>
  </main>

  <script src="./js/i18n.js"></script>
  <script src="./js/api.js"></script>
  <script>
  document.getElementById('print-btn').addEventListener('click', () => window.print());
  const T = window.LittleBeeI18n.t;

  function el(html) { const d = document.createElement('div'); d.innerHTML = html.trim(); return d.firstElementChild; }
  function tilt(i) { return i % 2 === 0 ? 'tilt-l' : 'tilt-r'; }
  function escape(s) { return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  async function build() {
    const $w = document.getElementById('wall');
    let advice = [], predictions = [], names = [], onesies = [], voices = [];
    try { ({ items: advice }      = await window.LittleBeeAPI.listAdvice()); }      catch {}
    try { ({ items: predictions } = await window.LittleBeeAPI.listPredictions()); } catch {}
    try { ({ items: names }       = await window.LittleBeeAPI.listNames()); }       catch {}
    try { ({ items: onesies }     = await window.LittleBeeAPI.listOnesies()); }     catch {}
    try { ({ items: voices }      = await window.LittleBeeAPI.listVoices()); }      catch {}

    const items = [];

    // Photo album hero card (always present)
    items.push({ ts: Date.now(), html: `
      <div class="mem theme-photos">
        <span class="mem__type">${T('memoryWall.typePhotos','photos')}</span>
        <p class="font-script text-3xl" style="color: var(--rust-deep)">${T('memoryWall.albumTitle','View the album')}</p>
        <p class="muted text-sm">${T('memoryWall.albumSub','Photos uploaded by everyone today')}</p>
        <a class="btn" href="https://photos.app.goo.gl/ucdYLxEE6SmjXZHd7" target="_blank" rel="noopener">${T('memoryWall.albumBtn','📸 Open Photo Album')}</a>
      </div>` });

    voices.forEach(v => items.push({ ts: v.created_at, html: `
      <div class="mem">
        <span class="mem__type">${T('memoryWall.typeVoice','voice note')} · ${(v.duration||0).toFixed(1)}s</span>
        <span class="mem__nick">${escape(v.nickname)}</span>
        <audio controls preload="none" src="${v.audio_b64}"></audio>
      </div>` }));

    advice.forEach(a => items.push({ ts: a.created_at, html: `
      <div class="mem">
        <span class="mem__type">${T('memoryWall.typeAdvice','advice')}</span>
        <span class="mem__nick">${escape(a.nickname)}</span>
        <p class="mem__body italic">${escape(a.message)}</p>
      </div>` }));

    predictions.forEach(p => items.push({ ts: p.created_at, html: `
      <div class="mem">
        <span class="mem__type">${T('memoryWall.typePrediction','prediction')} · ${escape(p.prompt_key||'')}</span>
        <span class="mem__nick">${escape(p.nickname)}</span>
        <p class="mem__body">${escape(p.value)}</p>
      </div>` }));

    names.forEach(n => items.push({ ts: n.created_at, html: `
      <div class="mem">
        <span class="mem__type">${T('memoryWall.typeName','name suggestion')} · ${n.votes||0} 💛</span>
        <span class="mem__nick">${escape(n.suggested_by)}</span>
        <p class="mem__big">${escape(n.name)}</p>
      </div>` }));

    onesies.forEach(o => items.push({ ts: o.created_at, html: `
      <div class="mem">
        <span class="mem__type">${T('memoryWall.typeOnesie','onesie')} · ${o.likes||0} 💛</span>
        <span class="mem__nick">${escape(o.nickname)}</span>
        <img src="${o.image_b64}" alt="onesie design" />
      </div>` }));

    // Sort by recency, then render
    items.sort((a, b) => (b.ts || 0) - (a.ts || 0));

    if (items.length <= 1) {
      $w.innerHTML = `<div class="mem theme-empty" style="column-span: all;">${T('memoryWall.empty','Memories will gather here as guests contribute throughout the day 🐝')}</div>`;
      return;
    }

    $w.innerHTML = '';
    items.forEach((it, i) => {
      const node = el(it.html);
      node.classList.add(tilt(i));
      $w.appendChild(node);
    });
  }

  build();
  window.addEventListener('lb-lang-changed', build);
  </script>
</body>
</html>
